<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium All-in-One Downloader</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Poppins', sans-serif; text-align: center; padding: 20px; }
        .hero { margin: 50px 0; }
        h1 { font-size: 2.5em; background: linear-gradient(90deg, #00ff00, #00d4ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .input-box { width: 90%; max-width: 500px; padding: 18px; border-radius: 15px; border: none; background: #1a1a1a; color: #fff; border: 1px solid #333; margin-bottom: 20px; font-size: 16px; outline: none; }
        .btn { padding: 18px 40px; background: linear-gradient(90deg, #00ff00, #00cc00); border: none; border-radius: 15px; font-weight: bold; cursor: pointer; color: #000; font-size: 18px; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(0, 255, 0, 0.3); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 400px; margin: 30px auto; }
        .item { background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #333; font-weight: 600; }
        .social { margin-top: 50px; border-top: 1px solid #333; padding-top: 20px; }
        .social a { color: #00d4ff; text-decoration: none; margin: 0 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Premium Downloader</h1>
        <p>Download Videos in High Quality Instantly</p>
    </div>

    <input type="text" class="input-box" placeholder="Paste your video link here...">
    <br>
    <button class="btn">🚀 DOWNLOAD NOW</button>

    <div class="grid">
        <div class="item">✅ TikTok</div>
        <div class="item">✅ Twitter (X)</div>
        <div class="item">✅ Facebook</div>
        <div class="item">✅ YouTube</div>
    </div>

    <div class="social">
        <p>Follow the Developer:</p>
        <a href="https://facebook.com/your-profile" target="_blank">Facebook</a>
        <a href="https://youtube.com/your-channel" target="_blank">YouTube</a>
    </div>

    <p style="margin-top: 30px; color: #444; font-size: 12px;">© 2026 Sheikh Lam | All Rights Reserved</p>

</body>
</html>
