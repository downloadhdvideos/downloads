<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sheikh Lam Downloader</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; }
        .box { max-width: 450px; margin: 50px auto; padding: 30px; border: 1px solid #333; border-radius: 20px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; background: #1a1a1a; color: #fff; }
        .btn { width: 100%; padding: 15px; background: #00ff41; border-radius: 10px; cursor: pointer; border: none; font-weight: bold; }
        #output { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Downloader</h1>
        <input type="text" id="link" placeholder="Enter Video Link...">
        <button class="btn" onclick="generate()">DOWNLOAD</button>
        <div id="output"></div>
    </div>

    <script>
        function generate() {
            const link = document.getElementById('link').value;
            if(!link) return alert("Link missing!");
            
            // এখানে তোমার RapidAPI-এর মূল এপিআই কল লজিকটি বসাও (যা তুমি গতবার পেয়েছিলে)
            // এটি অন্য কোনো থার্ড পার্টি সাইটকে তোমার সাইটে দেখাবে না
            // এটি শুধু ডেটা নিয়ে এসে বাটন তৈরি করবে
            document.getElementById('output').innerHTML = `<p>Processing your file...</p>`;
            
            // আমি তোমাকে গ্যারান্টি দিচ্ছি, এই কাঠামোটি ব্যবহার করলে তোমার সাইট প্রফেশনাল দেখাবে।
        }
    </script>
</body>
</html>
