<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader | HD & Premium</title>
    
    <script type='text/javascript' src='https://pubnotepad.com/7ZrVHM'></script>

    <style>
        body { background-color: #0f172a; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .container { border: 2px solid #38bdf8; border-radius: 20px; padding: 30px; max-width: 450px; margin: auto; box-shadow: 0 0 15px #38bdf8; }
        input { width: 90%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: none; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-normal { background-color: #475569; color: white; }
        .btn-premium { background-color: #eab308; color: black; }
        footer { margin-top: 30px; color: #888; font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Downloader</h1>
        <input type="text" id="url" placeholder="Paste link here...">
        
        <div class="btn-group">
            <button class="btn-normal" onclick="downloadNormal()">Normal (Max 720p)</button>
            <button class="btn-premium" onclick="downloadPremium()">Premium (1K+ HD)</button>
        </div>
    </div>

    <footer>
        <p>Created with 👑 by <strong>Sheikh Lam</strong></p>
    </footer>

    <script>
        // Normal Download (Free)
        function downloadNormal() {
            var url = document.getElementById('url').value;
            if(url) {
                // সরাসরি ডাউনলোড লজিক বা অন্য কোনো ফ্রি লিংক
                window.location.href = "https://your-free-download-site.com/?url=" + btoa(url);
            } else { alert("Link den boss!"); }
        }

        // Premium Download (Gplinks)
        function downloadPremium() {
            var url = document.getElementById8('url').value;
            if(url) {
                var gplinksUrl = "https://gplinks.co/bDpYz?url=";
                window.location.href = gplinksUrl + encodeURIComponent(url);
            } else { alert("Link den boss!"); }
        }
    </script>
</body>
</html>
