<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sheikh Lam Downloader</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; padding: 20px; }
        .container { max-width: 400px; margin: auto; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 10px; background: #222; border: 1px solid #444; color: #fff; }
        button { width: 100%; padding: 15px; background: #00ff41; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #result { margin-top: 20px; color: #00ff41; }
    </style>
</head>
<body>
<div class="container">
    <h1>Premium Downloader</h1>
    <input type="text" id="url" placeholder="Paste video link here...">
    <button onclick="getDownload()">🚀 DOWNLOAD NOW</button>
    <div id="result"></div>
</div>

<script>
    async function getDownload() {
        const url = document.getElementById("url").value;
        const resDiv = document.getElementById("result");
        resDiv.innerHTML = "Fetching...";

        const options = {
            method: 'POST',
            headers: {
                'content-type': 'application/json',
                'X-RapidAPI-Key': '0e617853f6msh255d0dadcc769cfp12b22ajsnc4fb156a524e', // তোমার কি (Key)
                'X-RapidAPI-Host': 'social-media-video-downloader.p.rapidapi.com'
            },
            body: JSON.stringify({ url: url })
        };

        try {
            const response = await fetch('https://social-media-video-downloader.p.rapidapi.com/apidownload', options);
            const data = await response.json();
            // সার্ভার থেকে লিংক পাওয়ার পর নিচে শো করবে
            resDiv.innerHTML = `<a href="${data.video_url}" target="_blank">Click Here to Save Video</a>`;
        } catch (err) {
            resDiv.innerHTML = "Error! Link not found.";
        }
    }
</script>
</body>
</html>
