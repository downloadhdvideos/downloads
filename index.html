<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All in One Downloader</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        h1 { color: #00ff00; }
        .input-box { width: 90%; padding: 15px; margin: 20px 0; border-radius: 10px; border: 1px solid #444; background: #111; color: #fff; }
        .btn { padding: 15px 30px; background: #00ff00; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; }
    </style>
</head>
<body>
    <h1>All in One Downloader</h1>
    <input type="text" class="input-box" placeholder="Paste video link here...">
    <br>
    <button class="btn">Download Now</button>
</body>
</html>
