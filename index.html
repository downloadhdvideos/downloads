<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Downloader | Sheikh Lam</title>
    <meta name="description" content="Download videos from TikTok, Instagram, Facebook, and YouTube easily. Premium fast downloader by Sheikh Lam.">
    <meta name="keywords" content="video downloader, tiktok downloader, instagram downloader, facebook video downloader, youtube downloader, sheikh lam">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --glass: rgba(255, 255, 255, 0.05); --neon: #00ff41; }
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; }
        h1 { font-size: 24px; margin-bottom: 20px; color: #fff; }
        #url { width: 100%; padding: 15px; border-radius: 15px; background: var(--glass); border: 1px solid #333; color: #fff; box-sizing: border-box; margin-bottom: 15px; outline: none; }
        .btn { width: 100%; padding: 16px; background: var(--neon); border: none; border-radius: 15px; color: #000; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .link { padding: 15px; background: var(--glass); border-radius: 15px; text-decoration: none; color: #fff; font-size: 14px; border: 1px solid #222; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .credit { margin-top: 40px; font-size: 12px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>Premium Downloader</h1>
    <input type="text" id="url" placeholder="Paste link here...">
    <button class="btn" onclick="go()">🚀 DOWNLOAD NOW</button>

    <div class="grid">
        <div class="link"><i class="fab fa-tiktok"></i> TikTok</div>
        <div class="link"><i class="fab fa-instagram"></i> Insta</div>
        <div class="link"><i class="fab fa-threads"></i> Threads</div>
        <div class="link"><i class="fab fa-twitter"></i> Twitter</div>
        
        <a href="https://facebook.com/your-profile-link" class="link"><i class="fab fa-facebook"></i> Facebook</a>
        <a href="https://youtube.com/your-channel-link" class="link"><i class="fab fa-youtube"></i> YouTube</a>
    </div>

    <div class="credit">
        <p>Created by Sheikh Lam | All Rights Reserved</p>
    </div>
</div>

<script>
    function go() {
        var v = document.getElementById("url").value;
        if(v.length > 5) window.open("https://snapsave.app/?url=" + encodeURIComponent(v), "_blank");
        else alert("Please paste a valid link!");
    }
</script>
</body>
</html>
